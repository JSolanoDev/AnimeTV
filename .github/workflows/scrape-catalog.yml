name: Scrape anime catalog

# Runs on a schedule AND can be triggered manually from the Actions tab
on:
  schedule:
    # Every 6 hours at :00 — adjust to taste
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      episodes:
        description: 'Also scrape episode URLs (slower)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      top:
        description: 'Top N shows to scrape episodes for'
        required: false
        default: '20'
      max_eps:
        description: 'Max episodes per show'
        required: false
        default: '5'

# Opt into Node.js 24 now to silence the "Node 20 deprecated" warning.
# Remove this line once all referenced actions ship Node-24 runtimes by default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN is enough for Vercel — it watches the branch for pushes.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Install Scrapling ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      # ── 4. Cache Camoufox browser binaries ────────────────────────────────
      # Camoufox is ~200 MB — cache it between runs to keep CI fast.
      - name: Cache Camoufox browser
        id: camoufox-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/camoufox
          key: camoufox-${{ runner.os }}-${{ hashFiles('scraper/requirements.txt') }}

      - name: Install Camoufox browser binaries
        if: steps.camoufox-cache.outputs.cache-hit != 'true'
        run: python -m scrapling install

      # ── 5. Run the scraper ─────────────────────────────────────────────────
      - name: Run scraper (metadata only)
        if: ${{ github.event.inputs.episodes != 'true' }}
        run: python scraper/anime_scraper.py
        timeout-minutes: 25

      - name: Run scraper (with episode URLs)
        if: ${{ github.event.inputs.episodes == 'true' }}
        run: |
          python scraper/anime_scraper.py \
            --episodes \
            --top ${{ github.event.inputs.top || '20' }} \
            --max-eps ${{ github.event.inputs.max_eps || '5' }}
        timeout-minutes: 30

      # ── 6. Commit the fresh catalog back to the repo ───────────────────────
      # Vercel auto-deploys on push, so committing the JSON = fresh data online.
      - name: Commit updated catalog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update anime catalog [skip ci]"
          file_pattern: scraper/anime_metadata.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          # skip_dirty_check: false → only commits if the file actually changed
