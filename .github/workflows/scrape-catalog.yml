name: Scrape anime catalog

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  schedule:
    # Once per day at 06:00 UTC
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      sites:
        description: 'Sites to scrape (comma-separated: animeav1,tioanime,animeflv)'
        required: false
        default: 'animeav1,tioanime,animeflv'
      scrapeEpisodes:
        description: 'Fetch episode URLs for top shows'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      top:
        description: 'Top N shows to enrich with episodes'
        required: false
        default: '20'
      maxEpisodes:
        description: 'Max episodes per show (most-recent first)'
        required: false
        default: '5'
      catalogPages:
        description: 'Catalog pages per site (more pages = more anime)'
        required: false
        default: '3'
      jikanEnrich:
        description: 'Enrich metadata via Jikan/MAL (synopsis, score, etc.)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Opt into Node 24 runtime for all referenced actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  scrape:
    name: Scrape + validate + commit catalog
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      # ── 4. Build scraper arguments ─────────────────────────────────────────
      - name: Build scraper arguments
        id: args
        run: |
          # Scheduled run defaults (primary sites, episodes on, Jikan off)
          SITES="animeav1,tioanime,animeflv"
          SCRAPE_EPS="true"
          TOP="20"
          MAX_EPS="5"
          CATALOG_PAGES="3"
          JIKAN_ENRICH="false"

          # Override with workflow_dispatch inputs when present
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SITES="${{ github.event.inputs.sites }}"
            SCRAPE_EPS="${{ github.event.inputs.scrapeEpisodes }}"
            TOP="${{ github.event.inputs.top }}"
            MAX_EPS="${{ github.event.inputs.maxEpisodes }}"
            CATALOG_PAGES="${{ github.event.inputs.catalogPages }}"
            JIKAN_ENRICH="${{ github.event.inputs.jikanEnrich }}"
          fi

          # Build argument string
          EXTRA_ARGS="--sites ${SITES} --top ${TOP} --max-eps ${MAX_EPS} --catalog-pages ${CATALOG_PAGES}"

          if [ "$SCRAPE_EPS" = "true" ]; then
            EXTRA_ARGS="--episodes ${EXTRA_ARGS}"
          fi

          if [ "$JIKAN_ENRICH" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --jikan-enrich"
          else
            EXTRA_ARGS="${EXTRA_ARGS} --no-jikan"
          fi

          echo "extra_args=${EXTRA_ARGS}" >> "$GITHUB_OUTPUT"
          echo "Scraper args: ${EXTRA_ARGS}"

      # ── 5. Run scraper ─────────────────────────────────────────────────────
      # Exits 0 on success or when previous catalog is kept.
      # Exits 1 only when 0 items AND no previous catalog exists.
      - name: Run anime scraper
        id: scrape
        run: python scraper/anime_scraper.py ${{ steps.args.outputs.extra_args }}
        timeout-minutes: 32

      # ── 6. Validate output ─────────────────────────────────────────────────
      - name: Validate catalog JSON
        run: |
          python - <<'PYEOF'
          import json, sys
          path = "scraper/anime_metadata.json"
          try:
              with open(path, encoding="utf-8") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("SKIP: anime_metadata.json not written (previous catalog kept). OK.")
              sys.exit(0)
          items    = data.get("items") or []
          ep_count = sum(len(i.get("episodes") or []) for i in items)
          sources  = data.get("sources") or [data.get("source", "?")]
          print(f"  Anime count    : {len(items)}")
          print(f"  Episode URLs   : {ep_count}")
          print(f"  Sources        : {sources}")
          print(f"  Scraped at     : {data.get('scrapedAt', '?')}")
          if len(items) == 0:
              print("ERROR: catalog is empty — will NOT commit.")
              sys.exit(1)
          print("Validation OK — ready to commit.")
          PYEOF

      # ── 7. Commit updated catalog ──────────────────────────────────────────
      - name: Commit updated catalog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update anime catalog [skip ci]"
          file_pattern: >-
            scraper/anime_metadata.json
            scraper/anime_metadata.previous.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # ── 8. Upload logs on failure ──────────────────────────────────────────
      - name: Upload scraper artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-failure-${{ github.run_id }}
          path: |
            scraper/anime_metadata.json
            scraper/anime_metadata.previous.json
          retention-days: 7
          if-no-files-found: warn
